<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title description">
  <title id="title">FitClub Plus fictional promotional plan</title><desc id="description">A one dollar first month promotion followed by 19.99 dollars per month.</desc>
  <rect width="1200" height="760" rx="32" fill="#101510"/><path d="M860-60 1250 220v310L690 94Z" fill="#B7F34A" opacity=".08"/><path d="M980 770 700 520l190-210 310 282v178Z" fill="#B7F34A" opacity=".06"/>
  <g font-family="Arial, sans-serif"><text x="64" y="70" font-size="30" font-weight="800" fill="#F8FAF2">FITCLUB+</text><text x="946" y="66" font-size="16" fill="#F8FAF2" opacity=".6">MEMBERSHIP CHECKOUT</text><text x="86" y="190" font-size="17" font-weight="700" fill="#B7F34A" letter-spacing="2.5">LIMITED INTRO OFFER</text><text x="86" y="274" font-size="67" font-weight="800" fill="#F8FAF2">Your first month.</text><text x="86" y="345" font-size="67" font-weight="800" fill="#B7F34A">Just $1.</text><text x="86" y="400" font-size="21" fill="#B5BEB0">Training plans, live classes and full club access.</text>
  <rect x="710" y="142" width="404" height="480" rx="28" fill="#F8FAF2"/><text x="756" y="205" font-size="17" font-weight="700" fill="#53604F" letter-spacing="1.5">PLUS MONTHLY</text><text x="756" y="278" font-size="22" fill="#53604F">Due today</text><text x="1068" y="280" text-anchor="end" font-size="36" font-weight="800" fill="#151A14">$1.00</text><line x1="756" y1="318" x2="1068" y2="318" stroke="#DCE3D8" stroke-width="2"/><text x="756" y="374" font-size="18" fill="#53604F">Then, after 1 month</text><text x="756" y="421" font-size="34" font-weight="800" fill="#151A14">$19.99 / month</text><rect x="756" y="476" width="312" height="72" rx="14" fill="#1E291D"/><text x="912" y="521" text-anchor="middle" font-size="19" font-weight="700" fill="#F8FAF2">Join FitClub+</text><text x="912" y="584" text-anchor="middle" font-size="13" fill="#778373">Auto-renews monthly. Cancel before the next billing date.</text></g>
