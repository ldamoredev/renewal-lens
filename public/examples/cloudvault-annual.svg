<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title description">
  <title id="title">CloudVault fictional annual plan</title><desc id="description">A plan advertised as 10 dollars per month and billed annually at 120 dollars.</desc>
  <rect width="1200" height="760" rx="32" fill="#F4F7FB"/><rect width="1200" height="94" rx="32" fill="#FFF"/><rect y="62" width="1200" height="32" fill="#FFF"/>
  <g font-family="Arial, sans-serif"><rect x="64" y="29" width="38" height="38" rx="12" fill="#0EA5A4"/><path d="M75 52c0-8 12-15 16-6 8-2 13 11 3 13H77c-7 0-8-7-2-7Z" fill="#FFF"/><text x="116" y="57" font-size="28" font-weight="700" fill="#0F172A">CloudVault</text><text x="920" y="55" font-size="17" fill="#64748B">Plans</text><text x="1010" y="55" font-size="17" fill="#64748B">Sign in</text><text x="600" y="160" text-anchor="middle" font-size="20" font-weight="700" fill="#0F766E" letter-spacing="1.7">PERSONAL STORAGE</text><text x="600" y="213" text-anchor="middle" font-size="40" font-weight="700" fill="#0F172A">One simple annual plan</text><text x="600" y="250" text-anchor="middle" font-size="19" fill="#64748B">Private storage that grows with your work.</text>
  <rect x="280" y="294" width="640" height="376" rx="26" fill="#FFF" stroke="#CBD5E1" stroke-width="2"/><rect x="314" y="324" width="132" height="34" rx="17" fill="#CCFBF1"/><text x="380" y="347" text-anchor="middle" font-size="14" font-weight="700" fill="#0F766E">SAVE 2 MONTHS</text><text x="330" y="414" font-size="27" font-weight="700" fill="#0F172A">CloudVault Pro</text><text x="330" y="452" font-size="18" fill="#64748B">2 TB encrypted cloud storage</text><text x="330" y="531" font-size="66" font-weight="700" fill="#0F172A">$10</text><text x="475" y="531" font-size="21" fill="#64748B">/ month</text><text x="330" y="571" font-size="17" font-weight="700" fill="#334155">$120 billed annually</text><rect x="646" y="486" width="224" height="70" rx="14" fill="#0F766E"/><text x="758" y="530" text-anchor="middle" font-size="19" font-weight="700" fill="#FFF">Choose annual</text><text x="600" y="624" text-anchor="middle" font-size="14" fill="#94A3B8">Plan renews annually until cancelled.</text></g>
</svg>
