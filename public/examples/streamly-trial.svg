<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title description">
  <title id="title">Streamly fictional checkout</title>
  <desc id="description">A seven-day free trial followed by a 12.99 dollar monthly subscription.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#111827"/><stop offset="1" stop-color="#1D4ED8"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dy="22" stdDeviation="24" flood-color="#020617" flood-opacity=".36"/></filter></defs>
  <rect width="1200" height="760" rx="32" fill="url(#bg)"/><circle cx="1060" cy="90" r="220" fill="#60A5FA" opacity=".12"/><circle cx="120" cy="700" r="270" fill="#A78BFA" opacity=".1"/>
  <g font-family="Arial, sans-serif" fill="#F8FAFC"><text x="70" y="76" font-size="30" font-weight="700">streamly</text><text x="1020" y="72" font-size="18" opacity=".72">Secure checkout</text></g>
  <g filter="url(#shadow)"><rect x="178" y="130" width="844" height="530" rx="30" fill="#FFF"/><rect x="178" y="130" width="844" height="12" rx="6" fill="#60A5FA"/></g>
  <g font-family="Arial, sans-serif" fill="#0F172A"><text x="238" y="213" font-size="18" font-weight="700" fill="#2563EB" letter-spacing="1.6">STREAMLY PLUS</text><text x="238" y="273" font-size="42" font-weight="700">Watch free for 7 days</text><text x="238" y="316" font-size="22" fill="#64748B">Unlimited films, series and offline viewing.</text><line x1="238" y1="356" x2="962" y2="356" stroke="#E2E8F0" stroke-width="2"/><text x="238" y="410" font-size="19" fill="#64748B">Due today</text><text x="962" y="412" text-anchor="end" font-size="24" font-weight="700">$0.00</text><text x="238" y="462" font-size="19" fill="#64748B">After your free trial</text><text x="962" y="464" text-anchor="end" font-size="24" font-weight="700">$12.99 / month</text><rect x="238" y="510" width="724" height="72" rx="14" fill="#2563EB"/><text x="600" y="555" text-anchor="middle" font-size="21" font-weight="700" fill="#FFF">Start my 7-day free trial</text><text x="600" y="622" text-anchor="middle" font-size="15" fill="#64748B">Renews automatically each month. Cancel anytime before renewal.</text></g>
</svg>
